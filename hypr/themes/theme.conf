#SYSTEMWIDE CURSOR (Change to your theme)
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = QT_CURSOR_THEME,Bibata-Modern-Classic
env = QT_CURSOR_SIZE,24


general {
    # gaps between pages
    gaps_in = 2
    gaps_out = 2

    # border size pages
    border_size = 10

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(21215fff) rgba(21215fff) 45deg
    col.inactive_border = rgba(070722cc) rgba(070722cc) 45deg

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}


group {
    col.border_active = rgba(21215fff) rgba(21215fff) 45deg
    col.border_inactive = rgba(070722cc) rgba(070722cc) 45deg
    col.border_locked_active = rgba(21215fff) rgba(21215fff) 45deg
    col.border_locked_inactive = rgba(070722cc) rgba(070722cc) 45deg
}

decoration {
    rounding = 10
    shadow:enabled = true
    active_opacity = 1.0
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    blur {
        enabled = yes
        size = 1
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = false
        special = true
    }
}
